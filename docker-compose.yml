version: '3.9'
services:
  web:
    build: .
    container_name: academia_voley_app
    ports:
      - "5000:5000"
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - FLASK_DEBUG=0
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=root
      - MYSQL_DB=academia_voley
      - ADMIN_EMAIL=admin@academiavoley.net
      - ADMIN_PASSWORD=AcaVoley!2026
      - SECRET_KEY=supersecuresecretkey
      - SMTP_HOST=smtp.example.com
      - SMTP_PORT=587
      - SMTP_USER=user@example.com
      - SMTP_PASSWORD=changeme
      - EMAIL_FROM=admin@academiavoley.net
    volumes:
      - .:/usr/src/app:cached
      - uploads:/usr/src/app/static/uploads:cached
    depends_on:
      - db
  db:
    image: mysql:8.0
    container_name: academia_voley_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: academia_voley
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql_init.sql:/docker-entrypoint-initdb.d/mysql_init.sql:ro

volumes:
  db_data:
  uploads:
