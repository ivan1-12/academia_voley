{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h4><i class="fas fa-sign-in-alt"></i> {{ _('Iniciar Sesión') }}</h4>
                </div>
                <div class="card-body">
                    <form method="POST" id="loginForm" novalidate>
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="mb-3">
                            <label for="email" class="form-label">{{ _('Correo Electrónico') }}</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">{{ _('Contraseña') }}</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="password" name="password" required minlength="8" maxlength="16">
                                <button class="btn btn-outline-secondary" type="button" id="togglePassword" aria-label="{{ _('Mostrar contraseña') }}">
                                    <i class="fas fa-eye" id="togglePasswordIcon"></i>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-sign-in-alt"></i> {{ _('Iniciar Sesión') }}
                        </button>
                    </form>
                    <script>
                        document.getElementById('loginForm').addEventListener('submit', function (e) {
                            const email = document.getElementById('email').value.trim();
                            const password = document.getElementById('password').value;
                            if (!email || !password) {
                                e.preventDefault();
                                alert('{{ _('Email y contraseña son obligatorios.') }}');
                                return;
                            }
                            if (password.length < 8 || password.length > 16) {
                                e.preventDefault();
                                alert('{{ _('La contraseña debe tener entre 8 y 16 caracteres.') }}');
                            }
                        });

                        document.getElementById('togglePassword').addEventListener('click', function () {
                            const passwordInput = document.getElementById('password');
                            const icon = document.getElementById('togglePasswordIcon');
                            if (passwordInput.type === 'password') {
                                passwordInput.type = 'text';
                                icon.classList.remove('fa-eye');
                                icon.classList.add('fa-eye-slash');
                                this.setAttribute('aria-label', '{{ _('Ocultar contraseña') }}');
                            } else {
                                passwordInput.type = 'password';
                                icon.classList.remove('fa-eye-slash');
                                icon.classList.add('fa-eye');
                                this.setAttribute('aria-label', '{{ _('Mostrar contraseña') }}');
                            }
                        });
                    </script>
                    <hr>
                    <div class="text-center">
                        <p>{{ _('¿No tienes cuenta?') }} <a href="{{ url_for('auth.registro') }}">{{ _('Regístrate aquí') }}</a></p>
                    </div>
                </div>
            </div>
            
        </div>
    </div>
</div>
{% endblock %}
