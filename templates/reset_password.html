{% extends "base.html" %}

{% block title %}{{ _('Restablecer contraseña') }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0"><i class="fas fa-key"></i> {{ _('Nueva contraseña') }}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">{{ _('Nueva contraseña') }}</label>
                        <input type="password" name="password_nueva" class="form-control" required minlength="8" maxlength="16">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ _('Confirmar contraseña') }}</label>
                        <input type="password" name="confirm_password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">{{ _('Actualizar contraseña') }}</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
